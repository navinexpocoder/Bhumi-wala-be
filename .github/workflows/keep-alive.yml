name: Keep Render Backend Alive

on:
  schedule:
    # Run every 5 minutes to keep the backend from sleeping
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        endpoints:
          - 'https://property-sales-api.onrender.com/health'
          - 'https://property-sales-api.onrender.com/api/properties?page=1&limit=1'
          - 'https://property-sales-api.onrender.com/api-docs'
    
    steps:
      - name: Ping backend endpoints
        run: |
          echo "Pinging: ${{ matrix.endpoints }}"
          response=$(curl -s -w "\n%{http_code}" "${{ matrix.endpoints }}" 2>&1)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          if [ "$http_code" = "200" ] || [ "$http_code" = "401" ] || [ "$http_code" = "404" ]; then
            echo "✓ Backend is awake. Status: $http_code"
          else
            echo "✗ Backend status: $http_code"
            exit 1
          fi
      
      - name: Log keep-alive ping
        if: always()
        run: |
          echo "Keep-alive ping completed at $(date)"
